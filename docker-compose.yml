services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    container_name: contribly-api
    env_file:
      - ./apps/api/.env.local
    environment:
      NODE_ENV: development
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    volumes:
      - .:/workspace
      - api_node_modules:/workspace/node_modules
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - contribly-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    container_name: contribly-web
    env_file:
      - ./apps/web/.env.local
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      API_SERVER_URL: http://api:3001
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - .:/workspace
      - web_node_modules:/workspace/node_modules
      - next_cache:/workspace/apps/web/.next
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    networks:
      - contribly-network

volumes:
  api_node_modules:
  web_node_modules:
  next_cache:

networks:
  contribly-network:
    driver: bridge
